<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="16" fill="#00B9F1"/>
  <!-- Body -->
  <ellipse cx="60" cy="58" rx="28" ry="34" fill="#1a1a1a"/>
  <!-- Belly -->
  <ellipse cx="60" cy="62" rx="17" ry="22" fill="white"/>
  <!-- Left wing -->
  <ellipse cx="35" cy="55" rx="10" ry="18" fill="#1a1a1a" transform="rotate(-15 35 55)"/>
  <!-- Right wing (raised) -->
  <ellipse cx="85" cy="48" rx="10" ry="18" fill="#1a1a1a" transform="rotate(30 85 48)"/>
  <!-- Left eye -->
  <circle cx="52" cy="43" r="4.5" fill="white"/>
  <circle cx="53" cy="43" r="2.5" fill="#1a1a1a"/>
  <!-- Right eye -->
  <circle cx="68" cy="43" r="4.5" fill="white"/>
  <circle cx="69" cy="43" r="2.5" fill="#1a1a1a"/>
  <!-- Beak -->
  <ellipse cx="60" cy="52" rx="7" ry="4" fill="#F59E0B"/>
  <!-- Feet -->
  <ellipse cx="50" cy="92" rx="9" ry="4" fill="#F59E0B"/>
  <ellipse cx="70" cy="92" rx="9" ry="4" fill="#F59E0B"/>
  <!-- Text -->
  <text x="60" y="114" text-anchor="middle" fill="white" font-family="Arial Black, Arial" font-weight="900" font-size="16" letter-spacing="1">wave</text>
</svg>
